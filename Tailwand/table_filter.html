<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Simple Table Filter UI</title>
</head>
<body class="bg-gray-100 p-10">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800">
        Users Table
      </h1>
      <select
        class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option>All Roles</option>
        <option>Admin</option>
        <option>Editor</option>
        <option>User</option>
      </select>
    </div>
    <div class="mb-4">
      <input
        type="text"
        placeholder="Search..."
        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
    </div>
    <div class="overflow-x-auto">
      <table class="w-full border border-gray-200 rounded-lg overflow-hidden">
        <thead class="bg-blue-500 text-white">
          <tr>
            <th class="text-left px-4 py-3">Name</th>
            <th class="text-left px-4 py-3">Email</th>
            <th class="text-left px-4 py-3">Role</th>
            <th class="text-left px-4 py-3">Status</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-3">John Doe</td>
            <td class="px-4 py-3">john@example.com</td>
            <td class="px-4 py-3">Admin</td>
            <td class="px-4 py-3">
              <span class="bg-green-100 text-green-700 text-sm px-3 py-1 rounded-full">
                Active
              </span>
            </td>
          </tr>
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-3">Sarah Smith</td>
            <td class="px-4 py-3">sarah@example.com</td>
            <td class="px-4 py-3">Editor</td>
            <td class="px-4 py-3">
              <span class="bg-yellow-100 text-yellow-700 text-sm px-3 py-1 rounded-full">
                Pending
              </span>
            </td>
          </tr>
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-3">Mike Johnson</td>
            <td class="px-4 py-3">mike@example.com</td>
            <td class="px-4 py-3">User</td>
            <td class="px-4 py-3">
              <span class="bg-red-100 text-red-700 text-sm px-3 py-1 rounded-full">
                Inactive
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
