<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Websites-Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <nav class="navbar navbar-expend-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">My Website</a>
             <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="navbarNav" class="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#registration">Registration</a>
                    </li>
                     <li class="nav-item">
                        <a class="nav-link active" href="#login">Login</a>
                    </li>
                     <li class="nav-item">
                        <a class="nav-link active" href="#galary">Galary</a>
                    </li>
                     <li class="nav-item">
                        <a class="nav-link active" href="#container">Containers</a>
                    </li>
                </ul>
            </div>
            <section id="home" class="home-section text-center text-white d-flex align-items-center">
        <div class="container">

            <h1>Welcome To My Website</h1>

            <p class="lead">
                Bootstrap Website Example
            </p>

            <button class="btn btn-warning">
                Explore More
            </button>

        </div>
    </section>

    <section id="register" class="py-5">
        <div class="container">

            <h2 class="text-center mb-4">Registration Form</h2>

            <div class="row justify-content-center">

                <div class="col-md-6">

                    <form class="shadow p-4 rounded bg-light">

                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" class="form-control" placeholder="Enter Name">
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control" placeholder="Enter Email">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" class="form-control" placeholder="Enter Password">
                        </div>

                        <button class="btn btn-primary w-100">
                            Register
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </section>
             <section id="login" class="py-5 bg-light">
        <div class="container">

            <h2 class="text-center mb-4">Login Form</h2>

            <div class="row justify-content-center">

                <div class="col-md-5">

                    <form class="shadow p-4 rounded bg-white">

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control" placeholder="Enter Email">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" class="form-control" placeholder="Enter Password">
                        </div>

                        <button class="btn btn-success w-100">
                            Login
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </section>


        </div>
    </nav>
</body>
</html>
