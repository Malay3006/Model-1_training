<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
            perspective: 1000px;
        }

        .full-screen-bg {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120vw;
            height: 120vh;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            z-index: -2;
            transition: transform 0.1s ease-out;
        }

        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: -1;
        }

        main {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem;
            width: 90%;
            max-width: 400px;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            color: white;
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .profile-container {
            width: 85px;
            height: 85px;
            margin: 0 auto 1.2rem;
            position: relative;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #4a90e2;
            cursor: pointer;
        }

        .profile-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .overlay-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .profile-container:hover img {
            transform: scale(1.2);
            filter: brightness(50%);
        }

        .profile-container:hover .overlay-icon {
            opacity: 1;
        }

        header h1 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4a90e2;
        }

        input:focus + i {
            color: #4a90e2;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #357abd;
            transform: translateY(-2px);
        }

        .social-section {
            margin-top: 1.5rem;
        }

        .social-section p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .social-sprite-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .sprite-icon {
            width: 32px;
            height: 32px;
            background: url('https://i.imgur.com/vHPrqH8.png') no-repeat;
            display: inline-block;
            transition: 0.3s;
            cursor: pointer;
        }

        .facebook { background-position: 0 0; }
        .twitter { background-position: -32px 0; }
        .linkedin { background-position: -64px 0; }

        .sprite-icon:hover {
            filter: brightness(1.3) drop-shadow(0 0 5px #4a90e2);
        }
    </style>
</head>
<body>

    <div class="full-screen-bg"></div>
    <div class="dark-overlay"></div>

    <main id="parallax-card">
        <div class="profile-container">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=200&auto=format&fit=crop" alt="Profile">
            <div class="overlay-icon"><i class="fa-solid fa-camera"></i></div>
        </div>

        <header>
            <h1>Join the Future</h1>
        </header>

        <section>
            <form action="#">
                <div class="input-wrapper">
                    <input type="text" placeholder="Full Name" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-wrapper">
                    <input type="email" placeholder="Email Address" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-wrapper">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit">
                    Register <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </section>

        <div class="social-section">
            <p>Or connect with</p>
            <div class="social-sprite-container">
                <div class="sprite-icon facebook" title="Facebook"></div>
                <div class="sprite-icon twitter" title="Twitter"></div>
                <div class="sprite-icon linkedin" title="LinkedIn"></div>
            </div>
        </div>
    </main>

    <script>
        const card = document.getElementById('parallax-card');
        const bg = document.querySelector('.full-screen-bg');

        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 45;
            let y = (window.innerHeight / 2 - e.pageY) / 45;

            bg.style.transform = `translate(${x}px, ${y}px)`;
            card.style.transform = `rotateY(${x * 1.2}deg) rotateX(${-y * 1.2}deg)`;
        });
    </script>
</body>
</html>
