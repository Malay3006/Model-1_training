<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1504608524841-42fe6f032b4b?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover;
            padding: 20px;
            color: #ffffff;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 32px;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 12px 16px;
            color: #fff;
            font-size: 1rem;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            outline: none;
            color: white;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Current Weather Section */
        .current-weather {
            margin-bottom: 35px;
        }

        .city-name {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 300;
            margin: 10px 0;
            letter-spacing: -2px;
        }

        .description {
            font-size: 1rem;
            text-transform: capitalize;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }
        .forecast-title {
            text-align: left;
            font-size: 0.95rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .forecast-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .forecast-day {
            background: rgba(255, 255, 255, 0.04);
            padding: 14px 10px;
            border-radius: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .forecast-day .day {
            color: rgba(255, 255, 255, 0.6);
        }

        .forecast-day .temp {
            font-weight: 500;
        }
        .message {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <h1>Weather Explorer</h1>
        <p class="subtitle">Stay updated with the latest weather conditions</p>

        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
            <button id="search-btn">Search</button>
        </div>

        <div id="weather-content">
            <p class="message">Search for a city to discover its current climate.</p>
        </div>
    </div>
</body>
</html>
